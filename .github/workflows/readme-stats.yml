name: Update README stats

on:
  schedule:
    - cron: "23 6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: bhdicaire
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const user = process.env.GITHUB_USER;
          const token = process.env.GITHUB_TOKEN;
          const headers = {
            "Accept": "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
            "User-Agent": `${user}-profile-readme`
          };

          if (token) {
            headers.Authorization = `Bearer ${token}`;
          }

          async function request(url) {
            const response = await fetch(url, { headers });
            if (!response.ok) {
              throw new Error(`${response.status} ${response.statusText}: ${url}`);
            }
            return response.json();
          }

          async function getAllRepos() {
            const repos = [];
            for (let page = 1; page <= 10; page += 1) {
              const batch = await request(`https://api.github.com/users/${user}/repos?type=owner&per_page=100&page=${page}`);
              repos.push(...batch);
              if (batch.length < 100) {
                break;
              }
            }
            return repos;
          }

          const profile = await request(`https://api.github.com/users/${user}`);
          const repos = await getAllRepos();
          const created = new Date(profile.created_at);
          const now = new Date();
          let accountAge = now.getUTCFullYear() - created.getUTCFullYear();
          const anniversaryThisYear = Date.UTC(now.getUTCFullYear(), created.getUTCMonth(), created.getUTCDate());

          if (now.getTime() < anniversaryThisYear) {
            accountAge -= 1;
          }

          const stars = repos.reduce((total, repo) => total + repo.stargazers_count, 0);
          const template = fs.readFileSync(".github/README.template.md", "utf8");
          const readme = template
            .replaceAll("{{ ACCOUNT_AGE }}", String(accountAge))
            .replaceAll("{{ STARS }}", String(stars));

          fs.writeFileSync("README.md", readme);
          NODE

      - name: Commit README
        run: |
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "docs: update profile stats"
            git push
          fi
