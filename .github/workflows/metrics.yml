name: Metrics

on:
  # Update metrics daily at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write

    steps:

      - name: General stats
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: header.svg
          user: bhdicaire
          template: classic
          config_timezone: America/Toronto

          # Base sections — keeps it clean for a professional profile
          base: header
          base_hireable: yes

      - name: acti_comm
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: acti_comm.svg
          user: bhdicaire
          template: classic
          config_timezone: America/Toronto
          base: activity, community
          
      - name: repositories
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: repositories.svg
          user: bhdicaire
          template: classic
          config_timezone: America/Toronto
          base: repositories