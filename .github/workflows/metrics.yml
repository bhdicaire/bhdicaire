name: Metrics

on:
  # Update metrics daily at midnight UTC
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      contents: write

    steps:

      - name: General stats
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: header.svg
          user: bhdicaire
          template: classic
          config_timezone: America/Toronto

          base: header
          base_hireable: no
          base_indepth: no

      - name: Summary stats
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: summary.svg
          user: bhdicaire
          template: classic
          config_timezone: America/Toronto
          config_display: columns
          base: repositories, activity
          repositories_affiliations: owner
          repositories_forks: no
